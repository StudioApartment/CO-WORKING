<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO—WORKING</title>
  <meta name="description" content="CO—WORKING — a fictional corporation that accidentally becomes a real one. Enterprise solutions for creative people.">
  <meta property="og:title" content="CO—WORKING">
  <meta property="og:description" content="A fictional corporation that accidentally becomes a real one. Enterprise solutions for creative people.">
  <meta property="og:image" content="images/hero-scan.png">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="images/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .tv-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tv-screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .channel {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.05s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .channel.is-active {
      opacity: 1;
    }

    .channel img,
    .channel video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .channel-video video {
      filter: grayscale(0.3) contrast(1.1);
    }

    .channel-static {
      background: #0a0a0a;
    }

    .channel-static::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
      opacity: 0.2;
      animation: static 0.08s steps(5) infinite;
    }

    .channel-static-alt {
      background: #080812;
    }

    .channel-static-alt::before {
      animation-duration: 0.12s;
      opacity: 0.25;
    }

    .channel-static-alt::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      animation: scanbar 2s linear infinite;
    }

    @keyframes static {
      0% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-5%) translateY(5%); }
      50% { transform: translateX(5%) translateY(-5%); }
      75% { transform: translateX(-5%) translateY(-5%); }
      100% { transform: translateX(5%) translateY(5%); }
    }

    @keyframes scanbar {
      0% { top: -10%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 110%; opacity: 0; }
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 10;
    }

    .vignette {
      display: none;
    }

    .flicker {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(255, 255, 255, 0);
      z-index: 12;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.02; }
    }

    .logo-overlay {
      position: absolute;
      top: 2rem;
      left: 2rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      z-index: 20;
      text-align: left;
    }

    .logo-we-are {
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .logo-main {
      max-width: min(60vw, 400px);
      height: auto;
      filter: brightness(0) invert(1);
    }


    .channel-indicator {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      z-index: 25;
      font-family: "IBM Plex Mono", "SF Mono", "Cascadia Mono", monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000;
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .channel-indicator.is-visible {
      opacity: 1;
    }

    .site-nav {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .site-nav a {
      font-family: "IBM Plex Mono", "SF Mono", "Cascadia Mono", monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
    }

    .site-nav a:hover {
      text-decoration: underline;
    }

    .nav-cta {
      border: 1px solid #fff;
      padding: 0.4rem 0.7rem;
      background: #fff;
      color: #000 !important;
    }

    .nav-cta:hover {
      background: transparent;
      color: #fff !important;
      text-decoration: none !important;
    }

    @media (max-width: 600px) {
      .logo-overlay {
        top: 1rem;
        left: 1rem;
      }

      .logo-we-are {
        font-size: 1.25rem;
      }

      .logo-main {
        max-width: 70vw;
      }

      .channel-indicator {
        bottom: 1rem;
        left: 1rem;
        font-size: 0.62rem;
      }

      .site-nav {
        top: 1rem;
        right: 1rem;
        gap: 0.75rem;
      }

      .site-nav a {
        font-size: 0.62rem;
      }

      .nav-cta {
        padding: 0.35rem 0.55rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scanlines,
      .flicker,
      .channel-static::before {
        animation: none;
      }

      .channel {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <div class="tv-screen">
      <!-- Channel 1: 90s Office Video (falls back to static if video unavailable) -->
      <div class="channel channel-video" data-channel="1">
        <video id="office-video" autoplay muted loop playsinline>
          <source src="images/office-footage.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 8: Video fallback / alternate static -->
      <div class="channel channel-static channel-static-alt" data-channel="8"></div>

      <!-- Channel 2: Hero Scan Image -->
      <div class="channel channel-image" data-channel="2">
        <img src="images/hero-scan.png?v=2" alt="">
      </div>

      <!-- Channel 3: Type Study 01 -->
      <div class="channel channel-image" data-channel="3">
        <img src="images/study-01-device.png" alt="">
      </div>

      <!-- Channel 4: Static/Noise -->
      <div class="channel channel-static" data-channel="4"></div>

      <!-- Channel 5: Type Study 02 -->
      <div class="channel channel-image" data-channel="5">
        <img src="images/study-02-badge.png" alt="">
      </div>

      <!-- Channel 6: Type Study 03 -->
      <div class="channel channel-image" data-channel="6">
        <img src="images/study-03-type.png" alt="">
      </div>

      <!-- Channel 7: Flowchart -->
      <div class="channel channel-image" data-channel="7">
        <img src="images/flowchart.png?v=3" alt="">
      </div>

      <!-- Channel 9: Servant Service Clip -->
      <div class="channel channel-video" data-channel="9">
        <video autoplay muted loop playsinline>
          <source src="images/clip-servant-service.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 10: Anime Clip 01 -->
      <div class="channel channel-video" data-channel="10">
        <video autoplay muted loop playsinline>
          <source src="images/clip-anime-01.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 11: Anime Clip 02 -->
      <div class="channel channel-video" data-channel="11">
        <video autoplay muted loop playsinline>
          <source src="images/clip-anime-02.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 12: Anime Clip 03 -->
      <div class="channel channel-video" data-channel="12">
        <video autoplay muted loop playsinline>
          <source src="images/clip-anime-03.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 13: Anime Clip 04 -->
      <div class="channel channel-video" data-channel="13">
        <video autoplay muted loop playsinline>
          <source src="images/clip-anime-04.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 14: London Clip 01 -->
      <div class="channel channel-video" data-channel="14">
        <video autoplay muted loop playsinline>
          <source src="images/clip-london-01.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 15: London Clip 02 -->
      <div class="channel channel-video" data-channel="15">
        <video autoplay muted loop playsinline>
          <source src="images/clip-london-02.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 16: London Clip 03 -->
      <div class="channel channel-video" data-channel="16">
        <video autoplay muted loop playsinline>
          <source src="images/clip-london-03.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 17: Businessman Clip -->
      <div class="channel channel-video" data-channel="17">
        <video autoplay muted loop playsinline>
          <source src="images/clip-businessman.mp4" type="video/mp4">
        </video>
      </div>

      <!-- CRT Effects -->
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="flicker"></div>
    </div>

    <!-- Logo Overlay -->
    <div class="logo-overlay">
      <p class="logo-we-are">we are</p>
      <img class="logo-main" src="images/logo-lockup.png?v=2" alt="CO—WORKING">
    </div>

    <!-- Channel Indicator -->
    <div class="channel-indicator">FIG. 01</div>

    <!-- Site Nav -->
    <nav class="site-nav">
      <a href="/events.html">Panel Discussions</a>
      <a class="nav-cta" href="https://co-badge.netlify.app" target="_blank" rel="noopener noreferrer">Get your badge →</a>
    </nav>
  </div>

  <script>
    (function() {
      const channels = document.querySelectorAll('.channel');
      const indicator = document.querySelector('.channel-indicator');
      const video = document.getElementById('office-video');
      
      // Check if video loaded successfully
      let videoAvailable = false;
      video.addEventListener('canplay', function() {
        videoAvailable = true;
      });
      video.addEventListener('error', function() {
        videoAvailable = false;
      });

      // Channel sequence mixing video clips with images and static
      const channelOrderWithVideo = [1, 9, 2, 10, 3, 14, 4, 11, 15, 1, 12, 2, 6, 16, 4, 13, 7, 17, 2, 1];
      const channelOrderNoVideo = [9, 10, 2, 11, 3, 14, 4, 12, 15, 9, 13, 2, 6, 16, 4, 17, 7, 2, 10, 9];
      
      let currentIndex = 0;
      let indicatorTimeout;

      function getChannelOrder() {
        return videoAvailable ? channelOrderWithVideo : channelOrderNoVideo;
      }

      function showChannel(channelNum) {
        channels.forEach(ch => {
          const isTarget = parseInt(ch.dataset.channel) === channelNum;
          ch.classList.toggle('is-active', isTarget);
        });

        // Show channel number
        indicator.textContent = 'FIG. ' + String(channelNum).padStart(2, '0');
        indicator.classList.add('is-visible');

        clearTimeout(indicatorTimeout);
        indicatorTimeout = setTimeout(() => {
          indicator.classList.remove('is-visible');
        }, 400);
      }

      // Video channels stay longer (1800ms), images/static are faster (600ms)
      const videoChannels = [1, 9, 10, 11, 12, 13, 14, 15, 16, 17];
      
      function getIntervalForChannel(channelNum) {
        return videoChannels.includes(channelNum) ? 1800 : 600;
      }

      let flipTimeout;

      function flipChannel() {
        const order = getChannelOrder();
        const channelNum = order[currentIndex];
        showChannel(channelNum);
        currentIndex = (currentIndex + 1) % order.length;
        
        // Schedule next flip with variable timing
        const nextInterval = getIntervalForChannel(channelNum);
        flipTimeout = setTimeout(flipChannel, nextInterval);
      }

      // Start after a brief delay to check video
      setTimeout(function() {
        flipChannel();
      }, 100);

      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          clearTimeout(flipTimeout);
        } else {
          flipChannel();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
          clearTimeout(flipTimeout);
          flipChannel();
        }
      });
    })();
  </script>
</body>
</html>
