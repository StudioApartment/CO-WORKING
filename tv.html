<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO—WORKING</title>
  <meta name="description" content="CO—WORKING — a fictional corporation that accidentally becomes a real one. Enterprise solutions for creative people.">
  <meta property="og:title" content="CO—WORKING">
  <meta property="og:description" content="A fictional corporation that accidentally becomes a real one. Enterprise solutions for creative people.">
  <meta property="og:image" content="images/hero-scan.png">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="images/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .tv-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tv-screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .channel {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.05s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .channel.is-active {
      opacity: 1;
    }

    .channel img,
    .channel video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .channel-video video {
      filter: grayscale(0.3) contrast(1.1);
    }

    .channel-static {
      background: #0a0a0a;
    }

    .channel-static::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
      opacity: 0.2;
      animation: static 0.08s steps(5) infinite;
    }

    .channel-static-alt {
      background: #080812;
    }

    .channel-static-alt::before {
      animation-duration: 0.12s;
      opacity: 0.25;
    }

    .channel-static-alt::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      animation: scanbar 2s linear infinite;
    }

    @keyframes static {
      0% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-5%) translateY(5%); }
      50% { transform: translateX(5%) translateY(-5%); }
      75% { transform: translateX(-5%) translateY(-5%); }
      100% { transform: translateX(5%) translateY(5%); }
    }

    @keyframes scanbar {
      0% { top: -10%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 110%; opacity: 0; }
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 10;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      z-index: 11;
    }

    .flicker {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(255, 255, 255, 0);
      z-index: 12;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.02; }
    }

    .logo-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      text-align: center;
      padding: 2rem;
    }

    .logo-we-are {
      font-family: "Times New Roman", Times, serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }

    .logo-main {
      max-width: min(80vw, 600px);
      height: auto;
      filter: brightness(0) invert(1) drop-shadow(0 4px 30px rgba(0,0,0,0.8));
    }

    .enter-link {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
    }

    .enter-link:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .channel-indicator {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 25;
      font-family: "Courier New", monospace;
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .channel-indicator.is-visible {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .logo-we-are {
        font-size: 0.85rem;
        letter-spacing: 0.25em;
      }

      .logo-main {
        max-width: 85vw;
      }

      .enter-link {
        bottom: 2rem;
        font-size: 0.7rem;
        padding: 0.6rem 1.2rem;
      }

      .channel-indicator {
        top: 1rem;
        right: 1rem;
        font-size: 1.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scanlines,
      .flicker,
      .channel-static::before {
        animation: none;
      }

      .channel {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <div class="tv-screen">
      <!-- Channel 1: 90s Office Video (falls back to static if video unavailable) -->
      <div class="channel channel-video" data-channel="1">
        <video id="office-video" autoplay muted loop playsinline>
          <source src="images/office-footage.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Channel 8: Video fallback / alternate static -->
      <div class="channel channel-static channel-static-alt" data-channel="8"></div>

      <!-- Channel 2: Hero Scan Image -->
      <div class="channel channel-image" data-channel="2">
        <img src="images/hero-scan.png?v=2" alt="">
      </div>

      <!-- Channel 3: Type Study 01 -->
      <div class="channel channel-image" data-channel="3">
        <img src="images/study-01-device.png" alt="">
      </div>

      <!-- Channel 4: Static/Noise -->
      <div class="channel channel-static" data-channel="4"></div>

      <!-- Channel 5: Type Study 02 -->
      <div class="channel channel-image" data-channel="5">
        <img src="images/study-02-badge.png" alt="">
      </div>

      <!-- Channel 6: Type Study 03 -->
      <div class="channel channel-image" data-channel="6">
        <img src="images/study-03-type.png" alt="">
      </div>

      <!-- Channel 7: Flowchart -->
      <div class="channel channel-image" data-channel="7">
        <img src="images/flowchart.png?v=3" alt="">
      </div>

      <!-- CRT Effects -->
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="flicker"></div>
    </div>

    <!-- Logo Overlay -->
    <div class="logo-overlay">
      <p class="logo-we-are">We Are</p>
      <img class="logo-main" src="images/logo-lockup.png?v=2" alt="CO—WORKING">
    </div>

    <!-- Channel Indicator -->
    <div class="channel-indicator">CH 01</div>

    <!-- Enter Site Link -->
    <a href="/" class="enter-link">Enter Site →</a>
  </div>

  <script>
    (function() {
      const channels = document.querySelectorAll('.channel');
      const indicator = document.querySelector('.channel-indicator');
      const video = document.getElementById('office-video');
      
      // Check if video loaded successfully
      let videoAvailable = false;
      video.addEventListener('canplay', function() {
        videoAvailable = true;
      });
      video.addEventListener('error', function() {
        videoAvailable = false;
      });

      // Channel sequence: video/static, hero, study1, static, hero, study2, video/static, study3, static, flowchart, hero, video/static
      // If video unavailable, channel 1 becomes channel 8 (alternate static)
      const channelOrderWithVideo = [1, 2, 3, 4, 2, 5, 1, 6, 4, 7, 2, 1];
      const channelOrderNoVideo = [8, 2, 3, 4, 2, 5, 8, 6, 4, 7, 2, 8];
      
      let currentIndex = 0;
      let indicatorTimeout;

      function getChannelOrder() {
        return videoAvailable ? channelOrderWithVideo : channelOrderNoVideo;
      }

      function showChannel(channelNum) {
        channels.forEach(ch => {
          const isTarget = parseInt(ch.dataset.channel) === channelNum;
          ch.classList.toggle('is-active', isTarget);
        });

        // Show channel number (map 8 back to 1 for display)
        const displayNum = channelNum === 8 ? 1 : channelNum;
        indicator.textContent = 'CH ' + String(displayNum).padStart(2, '0');
        indicator.classList.add('is-visible');

        clearTimeout(indicatorTimeout);
        indicatorTimeout = setTimeout(() => {
          indicator.classList.remove('is-visible');
        }, 400);
      }

      function flipChannel() {
        const order = getChannelOrder();
        const channelNum = order[currentIndex];
        showChannel(channelNum);
        currentIndex = (currentIndex + 1) % order.length;
      }

      // Start after a brief delay to check video
      setTimeout(function() {
        flipChannel();
      }, 100);

      const intervalTime = 800;
      let flipInterval = setInterval(flipChannel, intervalTime);

      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          clearInterval(flipInterval);
        } else {
          flipInterval = setInterval(flipChannel, intervalTime);
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
          clearInterval(flipInterval);
          flipChannel();
          flipInterval = setInterval(flipChannel, intervalTime);
        }
      });
    })();
  </script>
</body>
</html>
